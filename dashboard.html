<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Ponto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TEMA DARK ORIGINAL RESTAURADO */
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ========================================== */
        /* LAYOUT AHGORA MULTI (ADAPTADO PARA DARK)   */
        /* ========================================== */
        .app-multi-card {
            background-color: var(--surface-color);
            max-width: 420px;
            margin: 0 auto 40px auto;
            border-radius: 24px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #334155;
        }

        .app-brand {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .clock-circle {
            width: 220px;
            height: 220px;
            border: 3px solid #334155;
            border-radius: 50%;
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .clock-time {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: -2px;
            line-height: 1;
        }

        .btn-espelho {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 40px;
            transition: 0.3s;
        }

        .btn-espelho:hover { background: rgba(59,130,246,0.1); }

        .acoes-ponto {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-ponto {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s;
        }

        .btn-ponto:active { transform: scale(0.98); }
        .btn-entrada { background-color: var(--success-color); }
        .btn-saida { background-color: var(--danger-color); }

        /* ========================================== */
        /* RESTANTE DO SISTEMA (HISTÓRICO E ADMIN)    */
        /* ========================================== */
        .card {
            background: var(--surface-color);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2, h3 { margin-top: 0; color: #fff; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); }
        .form-control {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #334155; background: #0f172a; color: #fff;
            box-sizing: border-box;
        }

        .btn-primary {
            background: var(--accent-color); color: #fff; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .btn-primary:hover { background: #2563eb; }

        .acoes-batida { display: flex; gap: 10px; }
        .btn-acao { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .btn-acao:hover { color: #fff; }

        ul { list-style: none; padding: 0; margin: 0; }
        #lista-geral-pontos li {
            background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: var(--text-muted); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .badge-positivo { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-negativo { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-neutro { background: rgba(59,130,246,0.15); color: #3b82f6; }
        
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: var(--surface-color); margin: 10% auto; padding: 25px;
            border-radius: 12px; width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- CARD DO COLABORADOR: ESTILO AHGORA MULTI (DARK) -->
        <div class="app-multi-card" id="painel-colaborador">
            
            <div class="app-brand">
                <i class="fa-solid fa-fingerprint"></i>
                PONTOPRO SISTEMAS
            </div>

            <!-- Círculo do Relógio -->
            <div class="clock-circle">
                <div class="clock-time" id="relogio">00:00</div>
            </div>

            <!-- Botão "Espelho de Ponto" -->
            <button class="btn-espelho" onclick="document.getElementById('historico-diario').scrollIntoView({behavior: 'smooth'})">
                <i class="fa-solid fa-desktop"></i> Espelho de ponto
            </button>
            
            <!-- Botões Largos de Ação -->
            <div class="acoes-ponto">
                <button id="btnEntrada" class="btn-ponto btn-entrada">
                    <i class="fa-solid fa-face-smile"></i> REGISTRAR ENTRADA
                </button>
                <button id="btnSaida" class="btn-ponto btn-saida">
                    <i class="fa-solid fa-right-from-bracket"></i> REGISTRAR SAÍDA
                </button>
            </div>
        </div>

        <!-- HISTÓRICO DIÁRIO -->
        <div class="card" id="historico-diario">
            <h3 style="font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <i class="fa-solid fa-list-check" style="color: var(--accent-color);"></i> Meu Histórico Diário
            </h3>
            <ul id="lista-pontos" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- JS injeta os pontos aqui -->
            </ul>
        </div>

        <!-- SEÇÃO ADMIN: LANÇAMENTO MANUAL -->
        <div class="card" id="secao-cadastro-admin" style="display: none;">
            <h3><i class="fa-solid fa-keyboard" style="color: var(--accent-color);"></i> Lançamento Manual (Admin)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Colaborador:</label>
                    <select id="selectColaboradorManual" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Tipo:</label>
                    <select id="selectTipoManual" class="form-control">
                        <option value="Entrada">Entrada</option>
                        <option value="Saída">Saída</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data e Hora:</label>
                    <input type="datetime-local" id="inputDataManual" class="form-control">
                </div>
            </div>
            <button id="btnSalvarManual" class="btn-primary" style="width: 100%;"><i class="fa-solid fa-save"></i> Registrar Ponto Manual</button>
        </div>

        <!-- SEÇÃO ADMIN: AUDITORIA E RELATÓRIO -->
        <div class="card" id="painel-avancado-admin" style="display: none;">
            <h3><i class="fa-solid fa-magnifying-glass-chart" style="color: var(--accent-color);"></i> Auditoria de Turnos (Admin)</h3>
            <ul id="lista-geral-pontos" style="margin-bottom: 30px;"></ul>
            
            <hr style="border: 1px solid #334155; margin: 30px 0;">
            
            <h3><i class="fa-solid fa-file-invoice-dollar" style="color: var(--accent-color);"></i> Relatório Financeiro / Fechamento</h3>
            
            <!-- ÁREA DE FILTROS E BOTÕES PDF -->
            <div style="display: flex; gap: 15px; align-items: end; margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Data Início:</label>
                    <input type="date" id="dataInicioRelatorio" class="form-control">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Data Fim:</label>
                    <input type="date" id="dataFimRelatorio" class="form-control">
                </div>
                <button id="btnGerarRelatorio" class="btn-primary" style="height: 42px;"><i class="fa-solid fa-file-export"></i> Gerar Fechamento</button>
                
                <!-- BOTÃO DE PDF -->
                <button id="btnExportarPDF" class="btn-primary" style="height: 42px; display: none; background-color: var(--success-color);"><i class="fa-solid fa-file-pdf"></i> Baixar PDF</button>
            </div>
            
            <div id="container-relatorio"></div>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="modal-editar" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Editar Ponto</h3>
            <input type="hidden" id="editBatidaId">
            <div class="form-group">
                <label>Tipo:</label>
                <select id="editTipo" class="form-control">
                    <option value="Entrada">Entrada</option>
                    <option value="Saída">Saída</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nova Data e Hora:</label>
                <input type="datetime-local" id="editData" class="form-control">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btnSalvarEdicao" class="btn-primary" style="flex: 1; background: var(--success-color);">Salvar</button>
                <button id="btnCancelarEdicao" class="btn-primary" style="flex: 1; background: #64748b;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT DO RELÓGIO DIGITAL -->
    <script>
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
    </script>

    <!-- Bibliotecas para Gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
