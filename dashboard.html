<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>PontoPro | Painel</title>
</head>
<body>
    <div class="card">
        <h1>Painel de Ponto</h1>
        <button id="btnEntrada" style="margin-bottom:10px; background:#28a745; width: 100%; padding: 10px; color: white; border: none; border-radius: 5px;">Bater Entrada</button>
        <button id="btnSaida" style="background:#dc3545; width: 100%; padding: 10px; color: white; border: none; border-radius: 5px;">Bater Saída</button>
    </div>

    <div class="card" id="secao-cadastro-admin" style="margin-top: 20px;">
        <h2>Cadastrar Colaborador</h2>
        <form id="form-cadastro-colaborador">
            <input type="text" id="cad-nome" placeholder="Nome Completo" required style="width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box;">
            <input type="email" id="cad-email" placeholder="E-mail" required style="width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box;">
            <input type="password" id="cad-senha" placeholder="Senha Provisória" required minlength="6" style="width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box;">
            <button type="submit" style="background:#007bff; width: 100%; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer;">Cadastrar Novo Usuário</button>
        </form>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
