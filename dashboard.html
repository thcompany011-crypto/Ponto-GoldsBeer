<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoPro - Multi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilo Base Premium (Kiosk/Ahgora) */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --primary: #0284c7; /* Azul corporativo */
            --success: #10b981; /* Verde Entrada */
            --danger: #ef4444;  /* Vermelho Saída */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Topbar com Relógio */
        .topbar {
            width: 100%;
            background-color: var(--bg-card);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin-bottom: 30px;
        }

        .relogio-digital {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -2px;
            margin: 0;
        }

        .data-atual {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: capitalize;
            margin-top: 5px;
        }

        /* Container Central */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-header i { color: var(--primary); }

        /* Botões de Ponto (Massivos) */
        .acoes-ponto {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn-ponto {
            flex: 1;
            padding: 25px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s, filter 0.2s;
        }

        .btn-ponto i { font-size: 2rem; }
        .btn-ponto:active { transform: scale(0.97); }
        .btn-ponto:hover { filter: brightness(1.1); }
        .btn-entrada { background-color: var(--success); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-saida { background-color: var(--danger); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }

        /* Listas e Histórico - Sobrescrevendo o JS inline */
        ul { list-style: none; padding: 0; margin: 0; }
        
        ul li {
            background: #ffffff !important;
            border: 1px solid var(--border) !important;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            color: var(--text-main) !important;
        }

        ul li div { color: var(--text-main) !important; }
        ul li strong { color: var(--text-main) !important; }
        ul li i { color: var(--text-muted) !important; }
        ul li span[style*="color:#cbd5e1"] { color: var(--text-muted) !important; }

        /* Estilos do Admin */
        .painel-admin {
            display: none; /* Controlado pelo JS */
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .form-control {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: white;
        }

        .btn-admin {
            background-color: var(--primary);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        /* Modal Editar */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg-card); width: 90%; max-width: 400px; margin: 100px auto;
            padding: 25px; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

    <!-- Relógio Gigante Estilo Totem -->
    <div class="topbar">
        <div class="relogio-digital" id="relogio">00:00</div>
        <div class="data-atual" id="dataAtual">Carregando data...</div>
    </div>

    <div class="container">
        
        <!-- Área de Bater Ponto -->
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-fingerprint"></i> Meu Ponto</div>
            <div class="acoes-ponto">
                <button class="btn-ponto btn-entrada" id="btnEntrada">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Bater Entrada
                </button>
                <button class="btn-ponto btn-saida" id="btnSaida">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Bater Saída
                </button>
            </div>
        </div>

        <!-- Histórico do Usuário -->
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-list-check"></i> Meu Histórico Diário</div>
            <ul id="lista-pontos"></ul>
        </div>

        <!-- ========================================== -->
        <!-- ÁREA ADMINISTRATIVA (Oculta por padrão)    -->
        <!-- ========================================== -->
        
        <div class="card painel-admin" id="secao-cadastro-admin">
            <div class="card-header"><i class="fa-solid fa-keyboard"></i> Lançamento Manual (Admin)</div>
            <div class="form-row">
                <select id="selectColaboradorManual" class="form-control"></select>
                <select id="selectTipoManual" class="form-control">
                    <option value="Entrada">Entrada</option>
                    <option value="Saída">Saída</option>
                </select>
                <input type="datetime-local" id="inputDataManual" class="form-control">
            </div>
            <button class="btn-admin" id="btnSalvarManual"><i class="fa-solid fa-save"></i> Registrar Ponto Manual</button>
        </div>

        <div class="card painel-admin" id="painel-avancado-admin">
            <div class="card-header"><i class="fa-solid fa-user-shield"></i> Auditoria de Turnos (Admin)</div>
            <ul id="lista-geral-pontos"></ul>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
            
            <div class="card-header"><i class="fa-solid fa-file-invoice-dollar"></i> Fechamento Financeiro</div>
            <div class="form-row">
                <input type="date" id="dataInicioRelatorio" class="form-control">
                <input type="date" id="dataFimRelatorio" class="form-control">
            </div>
            <button class="btn-admin" id="btnGerarRelatorio"><i class="fa-solid fa-calculator"></i> Gerar Fechamento</button>
            <div id="container-relatorio" style="margin-top: 20px;"></div>
        </div>

    </div>

    <!-- Modal de Edição -->
    <div id="modal-editar" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: #0f172a;"><i class="fa-solid fa-pen"></i> Editar Batida</h3>
            <input type="hidden" id="editBatidaId">
            <select id="editTipo" class="form-control" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
                <option value="Entrada">Entrada</option>
                <option value="Saída">Saída</option>
            </select>
            <input type="datetime-local" id="editData" class="form-control" style="width:100%; margin-bottom:15px; box-sizing:border-box;">
            <div style="display:flex; gap:10px;">
                <button id="btnSalvarEdicao" class="btn-admin">Salvar</button>
                <button id="btnCancelarEdicao" class="btn-admin" style="background:#ef4444;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Script do Relógio (Visual) -->
    <script>
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('relogio').textContent = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const opcoesData = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dataAtual').textContent = agora.toLocaleDateString('pt-BR', opcoesData);
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
    </script>

    <!-- Seu Script Lógico do Firebase -->
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
