<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoPro - Dashboard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 10px; flex: 1; min-width: 300px; }
        button { border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-entrada { background-color: #27ae60; color: white; }
        .btn-saida { background-color: #e74c3c; color: white; }
        input, select { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; background-color: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; color-scheme: dark; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        
        .admin-panel { background-color: #2c3e50; border: 1px solid #34495e; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; color: #bbb; font-size: 14px; }
        .row-datas { display: flex; gap: 10px; }
        .btn-acao { padding: 5px 10px !important; width: auto !important; margin-bottom: 0 !important; font-size: 12px !important; margin-left: 5px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">PontoPro - Dashboard</h1>

    <div class="container">
        <div class="card">
            <h2 style="text-align: center;">Painel de Ponto</h2>
            <button id="btnEntrada" class="btn-entrada">Bater Entrada</button>
            <button id="btnSaida" class="btn-saida">Bater Saída</button>
        </div>

        <div class="card">
            <h2 style="text-align: center;">Meus Registros</h2>
            <ul id="lista-pontos"></ul>
        </div>

        <div class="card admin-panel" id="secao-cadastro-admin" style="display: none;">
            <h2 style="text-align: center;">Cadastrar Colaborador</h2>
            <input type="text" id="nomeNovo" placeholder="Nome Completo">
            <input type="email" id="emailNovo" placeholder="E-mail">
            <input type="password" id="senhaNova" placeholder="Senha Provisória">
            <button id="btnCadastrarNovo" style="background-color: #2980b9; color: white;">Cadastrar Novo Usuário</button>
        </div>
    </div>

    <div id="painel-avancado-admin" class="container" style="display: none; margin-top: 20px;">
        
        <div class="card admin-panel">
            <h3>Incluir Batida Manual</h3>
            <div class="form-group">
                <label>Colaborador:</label>
                <select id="selectColaboradorManual"></select>
            </div>
            <div class="form-group">
                <label>Tipo de Registro:</label>
                <select id="selectTipoManual">
                    <option value="Entrada">Entrada</option>
                    <option value="Saída">Saída</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data e Hora da Batida:</label>
                <input type="datetime-local" id="inputDataManual">
            </div>
            <button id="btnSalvarManual" style="background: #e67e22; color: white;">Salvar Batida Manual</button>
        </div>

        <div class="card admin-panel">
            <h3>Relatório de Horas</h3>
            <p style="font-size: 12px; color: #ccc;">Escolha as datas abaixo. Deixe em branco para puxar a semana atual.</p>
            
            <div class="row-datas">
                <div style="flex: 1;">
                    <label style="font-size: 12px; color: #bbb;">Data Início:</label>
                    <input type="date" id="dataInicioRelatorio">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 12px; color: #bbb;">Data Fim:</label>
                    <input type="date" id="dataFimRelatorio">
                </div>
            </div>

            <button id="btnGerarRelatorio" style="background: #9b59b6; color: white;">Gerar Relatório</button>
            <div id="container-relatorio" style="margin-top: 15px;"></div>
        </div>

        <div id="modal-editar" class="card admin-panel" style="display: none; border: 2px solid #f1c40f; flex: 100%;">
            <h3 style="color: #f1c40f;">Corrigir Batida</h3>
            <input type="hidden" id="editBatidaId">
            <div class="row-datas">
                <div class="form-group" style="flex: 1;">
                    <label>Alterar Tipo:</label>
                    <select id="editTipo">
                        <option value="Entrada">Entrada</option>
                        <option value="Saída">Saída</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>Alterar Data e Hora:</label>
                    <input type="datetime-local" id="editData">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btnSalvarEdicao" style="background: #27ae60; color: white;">Salvar Correção</button>
                <button id="btnCancelarEdicao" style="background: #7f8c8d; color: white;">Cancelar</button>
            </div>
        </div>

        <div class="card admin-panel" style="flex: 100%;">
            <h3>Todas as Batidas dos Colaboradores</h3>
            <ul id="lista-geral-pontos" style="max-height: 400px; overflow-y: auto;"></ul>
        </div>

    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/ponto.js"></script>
    <script type="module" src="js/dashboard.js"></script>

</body>
</html>
